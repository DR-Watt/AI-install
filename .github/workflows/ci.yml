name: "CI – AI/ML Installer Ellenőrzés"
# =============================================================================
# .github/workflows/ci.yml — v1.1.0
#
# SHELLCHECK POLICY:
#   --severity=error  → csak valódi hibák buktatják el a build-et
#   Warningok (SC2155 readonly+assign, SC2034 unused var, SC2088 tilde)
#   nem CI-hibák — stílus jelzések, nem funkcióhibák.
#   Kizárva: gh_connect.sh, git_setup.sh (third-party eszközök)
#   Ellenőrzött: 00_*.sh, 01*.sh, 02*.sh, 03*.sh, lib/*.sh
# =============================================================================

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  # ===========================================================================
  # 1. JOB: Shell script ellenőrzés (shellcheck)
  # ===========================================================================
  shellcheck:
    name: "🔍 Shell Script Ellenőrzés"
    runs-on: ubuntu-24.04

    steps:
      - name: "📥 Kód checkout"
        uses: actions/checkout@v4

      - name: "🔧 ShellCheck telepítése"
        run: sudo apt-get install -y shellcheck

      - name: "🔍 INFRA .sh fájlok ellenőrzése"
        run: |
          # INFRA scriptek ellenőrzése — kizárva:
          #   gh_connect.sh  : third-party connector eszköz
          #   git_setup.sh   : third-party setup eszköz
          #   *.bak.*        : backup fájlok
          # --severity=error : csak valódi hibák buktatják el (nem stílus warningok)
          find . -name "*.sh" \
            -not -path "./.git/*" \
            -not -name "gh_connect.sh" \
            -not -name "git_setup.sh" \
            -not -name "*.bak.*" \
          | sort | while read -r script; do
            echo "Ellenőrzés: $script"
            shellcheck --severity=error "$script"
          done

  # ===========================================================================
  # 2. JOB: Python kód minőség (ruff linter)
  # ===========================================================================
  python-lint:
    name: "🐍 Python Kód Minőség"
    runs-on: ubuntu-24.04
    if: |
      contains(toJSON(github.event.head_commit.modified), '.py') ||
      contains(toJSON(github.event.head_commit.added), '.py')

    steps:
      - name: "📥 Kód checkout"
        uses: actions/checkout@v4

      - name: "🐍 Python + UV telepítése"
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: "🔍 Ruff linter futtatása"
        run: |
          uv tool run ruff check . --output-format=github
          uv tool run ruff format . --check

  # ===========================================================================
  # 3. JOB: Biztonsági szken (gitleaks)
  # ===========================================================================
  security-scan:
    name: "🔒 Biztonsági Szken"
    runs-on: ubuntu-24.04

    steps:
      - name: "📥 Kód checkout (teljes história)"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🔒 Gitleaks – titkos kulcsok keresése"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # 4. JOB: Dokumentáció ellenőrzés
  # ===========================================================================
  docs-check:
    name: "📚 Dokumentáció Ellenőrzés"
    runs-on: ubuntu-24.04

    steps:
      - name: "📥 Kód checkout"
        uses: actions/checkout@v4

      - name: "📋 README.md létezés ellenőrzése"
        run: |
          if [[ ! -f "README.md" ]]; then
            echo "::warning::README.md hiányzik!"
          else
            echo "✓ README.md megtalálható"
            wc -l README.md
          fi

      - name: "📋 Dokumentációs prompt ellenőrzése"
        run: |
          if [[ -f "dokumentációs_prompt.md" ]]; then
            echo "✓ dokumentációs_prompt.md megtalálható"
          else
            echo "::warning::dokumentációs_prompt.md hiányzik!"
          fi
